apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oligo-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
  project: default  # TODO: Replace with your ArgoCD project
  destination:
    server: https://kubernetes.default.svc
    namespace: oligo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  # Multi-source: deploy ExternalSecrets first, then the Helm chart
  sources:
    # Source 1: ExternalSecret + SecretStore manifests (plain YAML)
    - repoURL: https://github.com/thuanoligo/oligo-helmchart-test.git  
      targetRevision: main
      path: external-secrets

    # Source 2: Oligo Operator Helm chart
    - repoURL: https://github.com/thuanoligo/oligo-helmchart-test.git  
      targetRevision: main
      path: .
      helm:
        valueFiles:
          - operator-values.yaml
        parameters:
          - name: controllerManager.clusterName
            value: "k3d-thuan-k3d"  # Change per cluster / use ApplicationSet for multi-cluster
