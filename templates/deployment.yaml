apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oligo-operator.deploymentName" . }}
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: operator
    app.kubernetes.io/part-of: operator
    control-plane: controller-manager
  {{- include "oligo-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "oligo-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
      {{- include "oligo-operator.selectorLabels" . | nindent 8 }}
      {{- include "oligo-operator.labels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        # Hash of the sensor overrides configmap
        configmap-hash: {{ include "oligo-operator.sensorOverridesConfigmapHash" . }}
        {{- include "oligo-operator.configMapAnnotations" . | nindent 8 }} # Auto update on config change
    spec:
      {{- with .Values.controllerManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.controllerManager.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.controllerManager.dnsConfig | nindent 8 }}
      {{- end }}

      {{- if .Values.imagePullSecret.required }}
      imagePullSecrets:
        - name: {{ include "oligo-operator.imagePullSecretName" . }}
      {{- end }}
      volumes:
      {{- include "oligo-operator.configMapVolume" . | nindent 6 }}
      {{ if index .Values "fluent-bit" "enabled" -}}
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: etcmachineid
        hostPath:
          path: /etc/machine-id
          type: File
      - name: fluent-bit-config-template
        configMap:
          name: fluent-bit-operator-config-map
          defaultMode: 0777
      - name: fluent-bit-config
        emptyDir: {}
      {{- end }}
      - name: sensor-overrides
        configMap:
          name: {{ include "oligo-operator.sensorOverridesConfigmap" . }}
      {{- with .Values.controllerManager.extraVolumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
      - args:
      {{ with index .Values.metricsService.ports 0 }}
        - --secure-listen-address=0.0.0.0:{{ .port }}
      {{- end }}
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --v=0
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ .Values.kubernetesClusterDomain }}
        {{- with .Values.controllerManager.manager.proxyEnvVars }}
          {{- toYaml . | nindent 8 }}
        {{ end }}
        image: {{ .Values.controllerManager.kubeRbacProxy.image.repository }}:{{ .Values.controllerManager.kubeRbacProxy.image.tag }}
        name: kube-rbac-proxy
        ports:
        {{ with index .Values.metricsService.ports 0 }}
        - containerPort: {{ .port }}
        {{- end }}
          name: https
          protocol: TCP
        resources: {{- toYaml .Values.controllerManager.kubeRbacProxy.resources | nindent
          10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - args:
        - "--config=/dist/{{- include "oligo-operator.configFileName" . -}}"
        volumeMounts:
        {{- include "oligo-operator.configMapVolumeMounts" . | nindent 8 }}
        - name: sensor-overrides
          # Coupled to code, do not change
          subPath: config.yaml
          mountPath: /etc/oligo/sensor-overrides.yaml
        {{- include "fluentBitConfigVolumeMounts" . | nindent 8 }}
        {{- with .Values.controllerManager.extraVolumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        {{- include "commonEnvVars" . | nindent 8 }}
        {{- include "fluentBitEnv" (dict "Values" .Values "containerName" "operator") | nindent 8 }}
        {{- if .Values.nativeRun }}
        - name: NATIVE_OPERATOR_RUN
          value: "true"
        {{- end }}
        {{- if and (not .Values.nativeRun) (index .Values "fluent-bit" "enabled") }}
        - name: SHOULD_TEMPLATE_FLUENT_BIT_CONFIG
          value: "true"
        {{- end }}
        - name: IMAGE_TAG
          value: {{ include "oligo-operator.tag" . }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ .Values.kubernetesClusterDomain }}
        - name: DEPLOYED_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SELF_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CHART_VERSION
          value: {{ include "oligo-operator.chart" . }}
        {{- with .Values.controllerManager.manager.proxyEnvVars }}
            {{- toYaml . | nindent 8 }}
        {{ end }}
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ include "oligo-operator.tag" . }}
        imagePullPolicy: Always
        name: manager
        {{ if eq .Values.controllerManager.manager.debugMode false }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 2
          periodSeconds: 2
          failureThreshold: 15

        {{ end }}
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

      serviceAccountName: {{ include "oligo-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
