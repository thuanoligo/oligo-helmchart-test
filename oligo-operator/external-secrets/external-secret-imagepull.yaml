apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oligo-imagepull-es
  namespace: oligo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: oligoregcred
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: oligo/imagepull    # Vault KV path: secret/data/oligo/imagepull
        property: username
    - secretKey: password
      remoteRef:
        key: oligo/imagepull    # Vault KV path: secret/data/oligo/imagepull
        property: password
