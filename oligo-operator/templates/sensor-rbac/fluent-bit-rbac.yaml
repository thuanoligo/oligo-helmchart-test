# Source: fluent-bit/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fluent-bit.serviceAccountName" . }}
  labels:
    {{- include "oligo-operator.labels" . | nindent 4 }}
---
# Source: fluent-bit/templates/clusterrole.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fluent-bit.clusterRoleName" . }}
  labels:
    {{- include "oligo-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
    verbs:
      - get
      - list
      - watch
---
# Source: fluent-bit/templates/clusterrolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fluent-bit.clusterRoleBindingName" . }}
  labels:
    {{- include "oligo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "fluent-bit.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "fluent-bit.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}