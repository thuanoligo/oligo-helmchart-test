apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "oligo-operator.managerRole" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "oligo-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  - serviceaccounts
  - services
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  - endpoints
  - nodes/proxy
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "extensions"
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "apps"
  resources:
  - deployments
  - replicasets
  - daemonsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oligo.oligosecurity.io
  resources:
  - oligodeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oligo.oligosecurity.io
  resources:
  - oligodeployments/finalizers
  verbs:
  - update
- apiGroups:
  - oligo.oligosecurity.io
  resources:
  - oligodeployments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  - httproutes
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - projectcontour.io
  resources:
  - httpproxies
  verbs:
  - get
  - watch
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oligo-operator.managerRoleBinding" . }}
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: operator
    app.kubernetes.io/part-of: operator
  {{- include "oligo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "oligo-operator.managerRole" . }}'
subjects:
- kind: ServiceAccount
  name: '{{ include "oligo-operator.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'